apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    rbac.authorization.kubernetes.io/autoupdate: "true"
  labels:
    kubernetes.io/bootstrapping: rbac-defaults
  name: system:kube-apiserver-to-kubelet
rules:
  - apiGroups:
      - ""
      # - ["apps"]もありますが、これはappという名前のapiグループです。nodeはコア（名前なし）apiグループに属します。
    resources:
    # nodes:親リソース proxy:子リソース
      - nodes/proxy
      - nodes/stats
      - nodes/log
      - nodes/spec
      - nodes/metrics
    verbs:
      - "*"
---
# 上記の権限をsubjectsに記載されていたものに与えます
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: system:kube-apiserver
  namespace: ""
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:kube-apiserver-to-kubelet
# ここのkubernetesは証明書のCNにマッチします
# kubernetesはapiserverのCNです
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: kubernetes