{
  "cniVersion": "1.0.0",
  "name": "bridge",
# 使う CNI プラグインが bridge であること。
# bridge プラグインは、コンテナ側 veth を作ってホスト側に出し、ホストの Linux bridge へ接続する。
  "type": "bridge",
# cni0というlinux bridgeにアクセスする。ないなら作る。linux bridgeというのは仮想スイッチのことです。
  "bridge": "cni0",
# ホスト側（つまりそのブリッジ側のホスト）が ゲートウェイ役 になる設定。
# 具体的には、cni0 に サブネット内のIP をホストが持って、Pod たちはそれをデフォルトGWとして使えるようになるイメージ。
  "isGateway": true,
# IP マスカレード（NAT）を有効化。
# Pod の送信元IP（例: 10.200.0.2）を、ノードの外向きIPに書き換えて外へ出す
# これが無いと、外部ネットワークが Pod のプライベートIPへの戻り経路を知らず、インターネットに出られないことが多い。
  "ipMasq": true,
  "ipam": {
# IPの払い出し方式が host-local。
#「このノード内でローカルにIPを管理して払い出す」方式。
# つまり、別ノードとは連携しない（マルチノードで“同じサブネットを全ノードで使う”みたいな設計だと衝突しやすい）。
# 単一ノード検証や、ノードごとにサブネットを分ける構成でよく使う。
    "type": "host-local",
    "ranges": [
      [{"subnet": "SUBNET"}]
    ],
    # 普通は "routes": [{"dst": "0.0.0.0/0", "gw":.....}]になるです。つまり、ルートというのはどの宛先を誰に送るべきかを決める仕組みです。
    # ここで"dst": "0.0.0.0/0"にするのは、isGateway=trueが「gw が未指定なら、bridge(cni0) のIPをデフォルトgwにする」を宣言しています。
    "routes": [{"dst": "0.0.0.0/0"}]
  }
}